<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Golden Gate Bridge</title>
  <desc id="desc">A clean, cartoon-style illustration of the Golden Gate Bridge over blue water, with rolling hills and clouds.</desc>
  <defs>
