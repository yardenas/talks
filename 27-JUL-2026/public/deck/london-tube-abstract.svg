    <path class="line" d="M312 750L488 574L676 574L830 420L1008 420L1224 636" stroke="#a0a5a9" stroke-width="20" />
    <path class="line" d="M246 126L432 312V492L572 632L762 632L902 492V300L1078 124" stroke="#9b0056" stroke-width="18" />
    <path class="line" d="M708 770L708 612L828 492L828 310L952 186" stroke="#000000" stroke-width="24" />
    <path class="line" d="M708 770L708 612L828 492L828 310L952 186" stroke="#f8fafc" stroke-width="8" opacity="0.72" />
