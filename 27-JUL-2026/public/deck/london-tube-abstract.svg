<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract London Tube map</title>
  <desc id="desc">A stylized abstract Tube-map composition with colored transit lines and station nodes on a white London map background.</desc>
  <defs>
    <style>
      .line {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .station {
        fill: #ffffff;
        stroke: #0f172a;
        stroke-width: 5;
      }
      .interchange {
        fill: #ffffff;
        stroke: #0f172a;
        stroke-width: 7;
      }
      .label {
        fill: #0f172a;
        font-family: Inter, Arial, sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .small-label {
        fill: #334155;
        font-family: Inter, Arial, sans-serif;
        font-size: 17px;
        font-weight: 650;
        letter-spacing: 0.5px;
      }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff" />

